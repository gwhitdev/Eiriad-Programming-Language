<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EIRIAD WASM TODO Example</title>
    <style>
      :root {
        --bg-a: #fdf8f0;
        --bg-b: #f2ecff;
        --ink: #201a11;
        --muted: #6e6458;
        --card: #fffdf8;
        --line: #eadfce;
        --accent: #0f766e;
        --accent-strong: #0b5f59;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(800px 400px at -10% -10%, #ffe8bf 0%, transparent 65%),
          radial-gradient(700px 300px at 110% 0%, #d9efff 0%, transparent 58%),
          linear-gradient(150deg, var(--bg-a), var(--bg-b));
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      }

      .shell {
        max-width: 1000px;
        margin: 36px auto;
        padding: 0 16px;
      }

      .hero {
        margin-bottom: 18px;
        animation: rise 420ms ease-out;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 3vw, 2.3rem);
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(280px, 1fr) minmax(280px, 1fr);
        gap: 14px;
      }

      @media (max-width: 820px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .card {
        background: color-mix(in srgb, var(--card) 90%, white 10%);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 14px 28px rgba(38, 24, 5, 0.08);
        animation: rise 480ms ease-out;
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 1.05rem;
      }

      .row {
        display: flex;
        gap: 10px;
      }

      input[type="text"] {
        flex: 1;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: #ffffff;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        color: #fff;
        background: var(--accent);
        font-weight: 650;
        cursor: pointer;
        transition: transform 120ms ease, background 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        background: var(--accent-strong);
      }

      button.secondary {
        background: #6b6f7a;
      }

      button.danger {
        background: var(--danger);
      }

      .actions {
        margin-top: 10px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .todo-list {
        margin: 0;
        padding-left: 18px;
        min-height: 140px;
      }

      .todo-list li {
        margin: 6px 0;
        line-height: 1.3;
      }

      pre {
        margin: 0;
        min-height: 180px;
        max-height: 300px;
        overflow: auto;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #1f2e45;
        background: #121a24;
        color: #d8f2ff;
        font-family: "Iosevka", "JetBrains Mono", monospace;
        font-size: 12.5px;
      }

      .status {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .code {
        font-family: "Iosevka", "JetBrains Mono", monospace;
        font-size: 12.5px;
        color: #3f3529;
      }

      @keyframes rise {
        from {
          transform: translateY(10px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <h1>EIRIAD WASM TODO App</h1>
        <p>
          This page keeps TODO state in an EIRIAD mutable variable inside the WebAssembly runtime.
        </p>
      </header>

      <section class="grid">
        <article class="card">
          <h2>Tasks</h2>
          <div class="row">
            <input id="todoInput" type="text" placeholder="Add a task" />
            <button id="addBtn">Add</button>
          </div>
          <div class="actions">
            <button id="refreshBtn" class="secondary">Refresh From Runtime</button>
            <button id="clearBtn" class="danger">Clear All</button>
          </div>
          <p class="status" id="status">Loading wasm runtime...</p>
          <ul class="todo-list" id="todoList"></ul>
        </article>

        <article class="card">
          <h2>Runtime Trace</h2>
          <p class="code">State variable: <strong>todo_text</strong></p>
          <pre id="trace"></pre>
        </article>
      </section>
    </main>

    <script type="module" src="./todo.js"></script>
  </body>
</html>
